<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ledger Lens | SQL Agent</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Literata:opsz,wght@7..72,600;7..72,700&family=Manrope:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/assets/styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="hero">
        <p class="eyebrow">Natural Language SQL</p>
        <p class="subtitle">Ask a question. Get SQL, results, and a plain-English summary.</p>
      </header>

      <section class="panel">
        <form id="ask-form" novalidate>
          <label for="question">Ask a database question</label>
          <textarea id="question" placeholder="Who are the top 10 customers by transaction amount this month?" required></textarea>
          <div class="form-row">
            <p class="hint">Enter to submit, Shift+Enter for a new line.</p>
            <button id="ask-btn" type="submit">Ask Agent</button>
          </div>
          <div class="examples" aria-label="Example prompts">
            <button type="button" class="chip" data-q="Who are the top 10 customers by total transaction amount?">Top customers</button>
            <button type="button" class="chip" data-q="Show daily transaction count for the last 30 days.">30-day trend</button>
            <button type="button" class="chip" data-q="Which accounts had the highest failed transactions this week?">Failed transactions</button>
          </div>
        </form>
      </section>

      <section class="status" id="status" aria-live="polite"></section>
      <section class="panel error" id="error-box" hidden></section>

      <section class="results" id="results" hidden>
        <article class="card">
          <h2>Summary</h2>
          <p id="summary"></p>
        </article>

        <article class="card">
          <h2>SQL</h2>
          <pre id="sql"></pre>
        </article>

        <article class="card full-width">
          <h2>Raw Result</h2>
          <pre id="rows"></pre>
        </article>
      </section>
    </main>

    <script src="/assets/app.js" defer></script>
  </body>
</html>
